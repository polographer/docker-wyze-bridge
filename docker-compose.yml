services:
    wyze-bridge:
        container_name: wyze-bridge
        restart: unless-stopped
        build:
            context: .
            dockerfile: ./docker/Dockerfile
            args:
                - VERSION=4.0-beta
        ports:
            - 5080:5080     # Bridge WebUI + REST API
            - 1984:1984     # go2rtc native API/WebUI (optional)
            - 8554:8554     # RTSP
            - 8888:8888     # HLS
            - 8889:8889     # WebRTC HTTP
            - 8189:8189/udp # WebRTC ICE
        volumes:
            - ./config:/config
            - ./media:/media      # snapshots land in /media/snapshots, recordings in /media/recordings
        environment:
            # Wyze credentials (required)
            - WYZE_EMAIL=
            - WYZE_PASSWORD=
            - WYZE_API_ID=
            - WYZE_API_KEY=

            # Network
            # - BRIDGE_IP=192.168.1.50  # Required for WebRTC

            # WebUI auth (default: false)
            # - BRIDGE_AUTH=true
            # - BRIDGE_USERNAME=wyze
            # - BRIDGE_PASSWORD=
            # - BRIDGE_API_TOKEN=          # bearer token for REST API

            # MQTT (optional)
            # - MQTT_HOST=mosquitto
            # - MQTT_PORT=1883
            # - MQTT_USERNAME=
            # - MQTT_PASSWORD=

            # Camera defaults
            # - QUALITY=hd
            # - AUDIO=true

            # Recording (disabled by default)
            # - RECORD_ALL=false
            # - RECORD_PATH=/record/{cam_name}/%Y/%m/%d
            # - RECORD_LENGTH=60s
            # - RECORD_KEEP=0s

            # Snapshots (disabled by default)
            # - SNAPSHOT_INTERVAL=0
            # - SNAPSHOT_PATH=/img
            # - SNAPSHOT_FILE_NAME={cam_name}

            # Debugging
            # - LOG_LEVEL=info
            # - FORCE_IOTC_DETAIL=false

            # TUTK stream discovery timeout (TUTK IOTC UDP discovery on slow networks)
            # - TUTK_DISCOVERY_TIMEOUT=15s
